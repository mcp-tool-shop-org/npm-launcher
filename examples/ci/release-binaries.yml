# Example GitHub Actions workflow for Python repos.
# Builds PyInstaller binaries, generates checksums, uploads to GitHub Release.
#
# Asset naming convention (must match npm-launcher expectations):
#   binary:    <TOOL_NAME>-<version>-<os>-<arch>[.exe]
#   checksums: checksums-<version>.txt
#
# Customize TOOL_NAME and ENTRYPOINT for your repo.

name: Release Binaries

on:
  push:
    tags: ["v*"]

env:
  TOOL_NAME: sovereignty  # change per repo
  ENTRYPOINT: src/sovereignty/__main__.py  # change per repo

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: macos-latest
            target: darwin-arm64
            ext: ""
          - os: macos-13
            target: darwin-x64
            ext: ""
          - os: windows-latest
            target: win-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - run: uv python install 3.12

      - run: uv venv

      - name: Install dependencies + PyInstaller
        run: uv pip install . pyinstaller

      - name: Build binary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          uv run pyinstaller --onefile --name "${{ env.TOOL_NAME }}" --console "${{ env.ENTRYPOINT }}"
          OUTNAME="${{ env.TOOL_NAME }}-${VERSION}-${{ matrix.target }}${{ matrix.ext }}"
          mv "dist/${{ env.TOOL_NAME }}${{ matrix.ext }}" "dist/${OUTNAME}"
          echo "ASSET_NAME=${OUTNAME}" >> "$GITHUB_ENV"
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ env.ASSET_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd artifacts
          sha256sum * > "checksums-${VERSION}.txt"
          cat "checksums-${VERSION}.txt"

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
